# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: bGZo's blog
description: >- # this means to ignore newlines until "baseurl:"
  Small is beautiful, less is more.
author: bGZo
github_username: bGZo
url: "https://blog.bgzo.cc"
baseurl: ""
permalink: /:title.html

highlighter: rouge

markdown: kramdown
kramdown:
  hard_wrap: true
  input: GFM
# More via: https://github.com/kramdown/parser-gfm

#### Deprecated via: https://github.com/jekyll/jekyll/issues/7838
#### Redcarpet support has been dropped in Jekyll 4.0
# markdown: redcarpet
# redcarpet:
#     extensions: [no_intra_emphasis, tables, fenced_code_blocks, strikethrough, underline, highlight, autolink, hard_wrap, with_toc_data]
# More via: https://github.com/vmg/redcarpet/blob/master/README.markdown

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

collections: # 定义 Jekyll 集合，用于将同类内容分组管理
  posts: # 名为 "posts" 的集合（对应 _posts/ 目录下的文件）
    output: false # 不为该集合的文档生成独立页面，仅作为数据源使用
  articles: # 名为 "articles" 的集合，用于实际对外发布的文章
    collections_dir: "" # 集合根目录设为网站根目录（空字符串表示根目录，覆盖默认值）
    source: _posts # 指定该集合从 _posts 目录读取源文件
    output: true # 为该集合的每篇文档生成独立的 HTML 输出页面
    permalink: /:title.html # 输出页面的 URL 格式：以文章标题命名，扩展名为 .html

defaults: # 批量为文档注入默认 front matter，避免每篇文章重复声明
  - scope: # 定义该组默认值的作用范围
      path: "" # 路径为空字符串，表示匹配网站内所有路径
      type: articles # 仅对 "articles" 集合中的文档生效
    values: # 以下为要注入的默认 front matter 字段
      layout: post # 默认使用 "post" 布局模板（对应 _layouts/post.html）

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - tailwind.config.js
  - LICENSE
  - utils/
  - package-lock.json
  - package.json
