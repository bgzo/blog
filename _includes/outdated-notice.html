{% if page.path contains '/labs/' %}
  {% assign ref_date = page.modified | default: page.created %}
  {% if ref_date %}
<time id="article-updated" datetime="{{ ref_date | date: '%Y-%m-%dT%H:%M:%S' }}" hidden></time>
<script>
  (function () {
    var el = document.getElementById("article-updated");
    if (!el) return;
    var updated = new Date(el.getAttribute("datetime"));
    var diffDays = Math.floor((Date.now() - updated.getTime()) / 86400000);
    if (diffDays <= 730) return;

    var dateStr = updated.toISOString().slice(0, 10).replace(/-/g, "/");

    var bq = document.createElement("blockquote");
    bq.className = "callout callout-warning";
    bq.innerHTML =
      '<p class="callout-title" aria-label="Content May Be Outdated">' +
        '<span class="callout-icon">' +
          '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">' +
            '<path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0 1 14.082 15H1.918a1.75 1.75 0 0 1-1.543-2.575Zm1.763.707a.25.25 0 0 0-.44 0L1.698 13.132a.25.25 0 0 0 .22.368h12.164a.25.25 0 0 0 .22-.368Zm.53 3.996v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/>' +
          '</svg>' +
        '</span>' +
        '&nbsp;Outdated Warning / 内容可能已经过时' +
      '</p>' +
      '<p>' +
        'This article was last updated <strong>' + diffDays + ' days ago</strong>, and may no longer be accurate. Please verify carefully.<br>' +
        '<em>本文最后更新于 <strong>' + diffDays + ' 天前</strong>，内容可能已经过时，请仔细甄别。</em>' +
      '</p>';

    el.parentNode.insertBefore(bq, el);
  })();
</script>
  {% endif %}
{% endif %}
