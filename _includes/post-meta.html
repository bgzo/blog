<p class="post-meta">
  Published:
  <time class="publish-date" datetime="{{ page.date | date: '%F' }}"
    >{{ page.date | date: "%Y/%m/%d" }}</time
  >
  {% if page.modified %} | Modified:
  <time class="update-date" datetime="{{ page.modified | date: '%F' }}"
    >{{ page.modified | date: "%Y/%m/%d" }}</time
  >
  {% endif %}
</p>
